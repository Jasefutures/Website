<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NQ Risk & Position Size Calculator</title>
<style>
  :root {
    --bg: #0b0d10; --surface: #14171c; --border: #262b33;
    --text: #e8eaed; --text-muted: #8a919e; --accent: #3987e5; --accent-text: #ffffff; --danger: #e66767;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; line-height: 1.6; }

  nav { border-bottom: 1px solid var(--border); }
  .nav-inner { max-width: 640px; margin: 0 auto; padding: 1rem 1.25rem;
    display: flex; align-items: center; justify-content: space-between; }
  .brand { color: var(--text); text-decoration: none; font-weight: 600; }
  .nav-links { display: flex; gap: 1.5rem; }
  .nav-links a { color: var(--text-muted); text-decoration: none; font-size: 0.95rem; }
  .nav-links a.active { color: var(--text); }
  .nav-links a:hover { color: var(--text); }

  .wrap { max-width: 640px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }
  header.page-head { text-align: center; margin-bottom: 2.5rem; }
  header.page-head h1 { font-size: 1.6rem; font-weight: 600; margin: 0 0 0.5rem; }
  header.page-head p { color: var(--text-muted); margin: 0; font-size: 0.95rem; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; margin-bottom: 2rem; }
  .card h2 { font-size: 1.1rem; margin: 0 0 1.25rem; }

  .field { margin-bottom: 1rem; }
  .field label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.35rem; }
  .field input, .field select {
    width: 100%; padding: 0.6rem 0.75rem; background: #0d0f13; border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 1rem;
  }
  .field input:focus, .field select:focus { outline: none; border-color: var(--accent); }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

  .results { margin-top: 1.5rem; padding-top: 1.25rem; border-top: 1px solid var(--border);
    display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .stat { background: #0d0f13; border-radius: 8px; padding: 0.9rem; }
  .stat .label { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.25rem; }
  .stat .value { font-size: 1.35rem; font-weight: 600; }
  .stat .value.warn { color: var(--danger); }

  footer { text-align: center; color: var(--text-muted); font-size: 0.8rem; margin-top: 2.5rem; }
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="../index.html" class="brand">NQ Toolkit</a>
    <div class="nav-links">
      <a href="index.html" class="active">Calculator</a>
      <a href="../ebook/index.html">Ebook</a>
    </div>
  </div>
</nav>

<div class="wrap">

  <header class="page-head">
    <h1>NQ risk & position size calculator</h1>
    <p>Work out contract size before you click buy.</p>
  </header>

  <div class="card">
    <h2>Calculator</h2>

    <div class="field">
      <label for="accountSize">Account size ($)</label>
      <input type="number" id="accountSize" value="10000" min="0" step="100">
    </div>

    <div class="row">
      <div class="field">
        <label for="riskPct">Risk per trade (%)</label>
        <input type="number" id="riskPct" value="1" min="0" step="0.1">
      </div>
      <div class="field">
        <label for="stopPoints">Stop distance (points)</label>
        <input type="number" id="stopPoints" value="20" min="0" step="0.25">
      </div>
    </div>

    <div class="field">
      <label for="contractType">Contract</label>
      <select id="contractType">
        <option value="20">NQ &mdash; $20 / point</option>
        <option value="2">MNQ &mdash; $2 / point</option>
      </select>
    </div>

    <div class="results">
      <div class="stat">
        <div class="label">Dollar risk (target)</div>
        <div class="value" id="outDollarRisk">$0</div>
      </div>
      <div class="stat">
        <div class="label">Risk per contract</div>
        <div class="value" id="outRiskPerContract">$0</div>
      </div>
      <div class="stat">
        <div class="label">Contracts to trade</div>
        <div class="value" id="outContracts">0</div>
      </div>
      <div class="stat">
        <div class="label">Actual dollar risk</div>
        <div class="value" id="outActualRisk">$0</div>
      </div>
    </div>
  </div>

  <footer>Not financial advice. For planning purposes only.</footer>

</div>

<script>
  const accountSize = document.getElementById('accountSize');
  const riskPct = document.getElementById('riskPct');
  const stopPoints = document.getElementById('stopPoints');
  const contractType = document.getElementById('contractType');

  const outDollarRisk = document.getElementById('outDollarRisk');
  const outRiskPerContract = document.getElementById('outRiskPerContract');
  const outContracts = document.getElementById('outContracts');
  const outActualRisk = document.getElementById('outActualRisk');

  function fmt(n) {
    return '$' + n.toLocaleString('en-US', { maximumFractionDigits: 2 });
  }

  function calculate() {
    const balance = parseFloat(accountSize.value) || 0;
    const risk = parseFloat(riskPct.value) || 0;
    const stop = parseFloat(stopPoints.value) || 0;
    const valuePerPoint = parseFloat(contractType.value) || 0;

    const dollarRisk = balance * (risk / 100);
    const riskPerContract = stop * valuePerPoint;
    const contracts = riskPerContract > 0 ? Math.floor(dollarRisk / riskPerContract) : 0;
    const actualRisk = contracts * riskPerContract;

    outDollarRisk.textContent = fmt(dollarRisk);
    outRiskPerContract.textContent = fmt(riskPerContract);
    outContracts.textContent = contracts;
    outActualRisk.textContent = fmt(actualRisk);
    outActualRisk.classList.toggle('warn', actualRisk > dollarRisk);
  }

  [accountSize, riskPct, stopPoints, contractType].forEach(el => {
    el.addEventListener('input', calculate);
    el.addEventListener('change', calculate);
  });

  calculate();
</script>

</body>
</html>
