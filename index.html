<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NQ Toolkit</title>
<style>
  :root {
    --bg: #0b0d10; --surface: #14171c; --border: #262b33;
    --text: #e8eaed; --text-muted: #8a919e; --accent: #3987e5;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

  nav { border-bottom: 1px solid var(--border); }
  .nav-inner { max-width: 640px; margin: 0 auto; padding: 1rem 1.25rem;
    display: flex; align-items: center; justify-content: space-between; }
  .brand { color: var(--text); text-decoration: none; font-weight: 600; }
  .nav-links { display: flex; gap: 1.5rem; }
  .nav-links a { color: var(--text-muted); text-decoration: none; font-size: 0.95rem; }
  .nav-links a:hover { color: var(--text); }

  .wrap { max-width: 640px; margin: 0 auto; padding: 3rem 1.25rem 4rem; text-align: center; }
  .wrap h1 { font-size: 1.7rem; margin: 0 0 0.75rem; }
  .wrap p { color: var(--text-muted); margin: 0 0 2.5rem; }

  .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 1.75rem 1.25rem; text-decoration: none; color: var(--text);
  }
  .card:hover { border-color: var(--accent); }
  .card .icon { font-size: 1.75rem; margin-bottom: 0.5rem; }
  .card h2 { font-size: 1.05rem; margin: 0 0 0.4rem; }
  .card p { color: var(--text-muted); font-size: 0.85rem; margin: 0; }

  @media (max-width: 480px) { .cards { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="index.html" class="brand">NQ Toolkit</a>
    <div class="nav-links">
      <a href="calculator/index.html">Calculator</a>
      <a href="ebook/index.html">Ebook</a>
    </div>
  </div>
</nav>

<div class="wrap">
  <h1>NQ trading toolkit</h1>
  <p>Work out your position size, and grab the free guide.</p>

  <div class="cards">
    <a class="card" href="calculator/index.html">
      <div class="icon">&#128202;</div>
      <h2>Calculator</h2>
      <p>NQ / MNQ risk & position size calculator</p>
    </a>
    <a class="card" href="ebook/index.html">
      <div class="icon">&#128218;</div>
      <h2>Ebook</h2>
      <p>Free guide, delivered to your inbox</p>
    </a>
  </div>
</div>

</body>
</html>
