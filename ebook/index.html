<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Free Ebook</title>
<style>
  :root {
    --bg: #0b0d10; --surface: #14171c; --border: #262b33;
    --text: #e8eaed; --text-muted: #8a919e; --accent: #3987e5; --accent-text: #ffffff; --danger: #e66767;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; line-height: 1.6; }

  nav { border-bottom: 1px solid var(--border); }
  .nav-inner { max-width: 640px; margin: 0 auto; padding: 1rem 1.25rem;
    display: flex; align-items: center; justify-content: space-between; }
  .brand { color: var(--text); text-decoration: none; font-weight: 600; }
  .nav-links { display: flex; gap: 1.5rem; }
  .nav-links a { color: var(--text-muted); text-decoration: none; font-size: 0.95rem; }
  .nav-links a.active { color: var(--text); }
  .nav-links a:hover { color: var(--text); }

  .wrap { max-width: 640px; margin: 0 auto; padding: 3rem 1.25rem 4rem; }

  .freebie { background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 2rem 1.5rem; text-align: center; }
  .freebie h1 { font-size: 1.4rem; margin: 0 0 0.5rem; }
  .freebie p { color: var(--text-muted); font-size: 0.95rem; margin: 0 0 1.5rem; }

  /* ============================================================
     KIT (ConvertKit) FORM EMBED GOES HERE.
     In Kit: Grow > Landing Pages & Forms > your form > Embed > copy
     the <script> + form snippet, and paste it in place of the
     placeholder form below. Delete the placeholder form when you do.
     ============================================================ */
  .placeholder-form { display: flex; gap: 0.5rem; flex-wrap: wrap; justify-content: center; }
  .placeholder-form input {
    flex: 1; min-width: 200px; padding: 0.7rem 0.9rem; background: #0d0f13;
    border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 1rem;
  }
  .placeholder-form button {
    padding: 0.7rem 1.4rem; background: var(--accent); color: var(--accent-text);
    border: none; border-radius: 8px; font-size: 1rem; font-weight: 500; cursor: pointer;
  }
  .placeholder-form button:hover { opacity: 0.9; }
  .placeholder-note { margin-top: 0.75rem; font-size: 0.75rem; color: var(--danger); }

  footer { text-align: center; color: var(--text-muted); font-size: 0.8rem; margin-top: 2.5rem; }
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="../index.html" class="brand">NQ Toolkit</a>
    <div class="nav-links">
      <a href="../calculator/index.html">Calculator</a>
      <a href="index.html" class="active">Ebook</a>
    </div>
  </div>
</nav>

<div class="wrap">

  <div class="freebie">
    <h1>[Ebook title here]</h1>
    <p>Drop your email and it lands in your inbox automatically.</p>

    <!-- PLACEHOLDER FORM — replace this entire form with the Kit embed snippet -->
    <form class="placeholder-form" onsubmit="event.preventDefault(); alert('Placeholder form — swap in your Kit embed code.');">
      <input type="email" placeholder="you@email.com" required>
      <button type="submit">Send it to me</button>
    </form>
    <div class="placeholder-note">Placeholder form &mdash; not wired up yet. Paste your Kit embed code here.</div>
  </div>

  <footer>Not financial advice. For planning purposes only.</footer>

</div>

</body>
</html>
